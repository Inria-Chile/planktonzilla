defaults:
  - default.yaml

auto_find_batch_size: false
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
num_train_epochs: 0
# Limit total training steps to a small number
max_steps: 2
# Evaluate every `eval_steps` steps (set equal to max_steps to run one evaluation)
eval_strategy: steps
eval_steps: 2
logging_steps: 2
save_strategy: "no"
load_best_model_at_end: false
