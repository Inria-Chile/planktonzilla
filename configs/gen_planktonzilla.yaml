# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - paths: default.yaml
  - extras: default.yaml
  - hydra: default.yaml


task_name: "gen_planktonzilla"
tags: ["dev"]

# Null defaults: the in-code fallbacks in gen_planktonzilla.main() resolve these
# to byte-identical values vs. the legacy argparse defaults. Override on the CLI,
# e.g. `pz_gen_planktonzilla output=/tmp/foo num_proc=4`.
taxo_csv: null
output: null
num_proc: null
