# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /dataset: default.yaml
  - override /model: resnet18.yaml
  - override /augmentation: default.yaml
  - override /training_arguments: default.yaml
  - override /tracking: default.yaml

experiment_metadata:
  dataset: ${strip_yaml_suffix:${hydra:runtime.choices.dataset}}
  model_name: ${strip_yaml_suffix:${hydra:runtime.choices.model}}
  loss: ${model.criterion._target_}
  augmentation_name: ${strip_yaml_suffix:${hydra:runtime.choices.augmentation}}
  sampler_type: ${dataset.sampler_type}

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
trainer:
  max_epochs: 200

find_optimal_batch_size: false
find_optimal_learning_rate: false
hgfc_hub_base_model_name: inria-chile/${model.net.model_name}_${strip_yaml_suffix:${hydra:runtime.choices.dataset}}
pytorch_script_filename: ${model.net.model_name}_${strip_yaml_suffix:${hydra:runtime.choices.dataset}}.script.pt


logger:
  wandb:
    tags: ${tags}
    project: none # to be set at runtime
    entity: oceania-plankton # set to name of your wandb team
    name: ${model.net.model_name}__${strip_yaml_suffix:${hydra:runtime.choices.dataset}}
    log_model: false
