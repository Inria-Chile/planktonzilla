# planktonzilla CI — runs on every push to main and every PR targeting main.
# 4 parallel jobs (lint, test, dep-isolation, test-explorer). Stand-up artifact of
# v1.1 Phase 8; dep-isolation guard added in Phase 9 (FND-04); the explorer-group
# view job added in Phase 11 (SANKEY-01..05).

name: CI

# 'on' is a YAML 1.1 boolean; quote the key so PyYAML / local validators don't
# coerce it to True. GitHub Actions accepts either form.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs when a new push lands on the same ref. Saves minutes
  # on rapid push cycles while still running on every PR head commit.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    # timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv (with cache)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          # Python is pinned by .python-version / pyproject.toml requires-python.
          # uv will resolve to 3.12 (the current devcontainer + HPC runtime).
          python-version: "3.13"

      - name: Installing ruff
        run: uv tool install ruff

      - name: Install project deps (uv sync)
        run: uv sync

      - name: Ruff format --check (planktonzilla/, tests/)
        run: uv run ruff format --check planktonzilla/ tests/

      - name: Ruff check (planktonzilla/, tests/)
        run: uv run ruff check planktonzilla/ tests/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    # timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv (with cache)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install project deps (uv sync)
        run: uv sync

      # Excludes the slow HF Trainer / HF Hub integration matrices (per-combo
      # ~7 min runtime; would blow the per-job timeout). Keeps the FOCUS-01
      # axis tests, FOCUS-02 resolver tests, and the post-DEL-01 vendored
      # fixtures (which self-skip via skip_if_vendored_deleted).
      - name: Run pytest (excluding slow integration matrix)
        run: uv run pytest tests/ --ignore=tests/test_train.py --ignore=tests/test_datasets.py -v

  dep-isolation:
    name: Dependency isolation (gradio/plotly guard)
    runs-on: ubuntu-latest
    # timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv (with cache)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          python-version: "3.13"

      # Core env ONLY — plain `uv sync` does not install the explorer dependency
      # group, so gradio/plotly must be absent here. Do not sync the explorer
      # group in this job; that is the boundary this guard protects.
      - name: Install project deps (core env, uv sync)
        run: uv sync

      # 1. The committed network-free guard: manifest + AST module-scope scan.
      - name: Run dependency-isolation guard test
        run: uv run pytest tests/test_dependency_isolation.py -q

      # 2. Belt-and-suspenders: the core env itself must NOT be able to import the
      #    viz deps. If either import succeeds, the boundary leaked — fail the build.
      - name: Assert viz deps are unimportable in core
        run: |
          if uv run python -c "import gradio" 2>/dev/null; then
            echo "LEAK: gradio importable in the core env"; exit 1
          fi
          if uv run python -c "import plotly" 2>/dev/null; then
            echo "LEAK: plotly importable in the core env"; exit 1
          fi
          echo "OK: gradio and plotly are both unimportable in core"

  test-explorer:
    name: Test explorer views (gradio/plotly/kaleido group)
    runs-on: ubuntu-latest
    # timeout-minutes: 15
    # This is the ONLY job allowed to install the isolated viz deps
    # (gradio/plotly/kaleido). It exercises the in-Space view modules whose
    # figure/render/export tests importorskip those deps (so they SKIP in the
    # core `test` job). The core `test` and `dep-isolation` jobs above stay
    # viz-free on purpose and must NOT sync the explorer group.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv (with cache)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install project deps + explorer group (uv sync --group explorer)
        run: uv sync --group explorer

      # Run the explorer-group view tests (figure/render/export actually execute
      # here). Add later view-phase test files (12/13) to this command as they land.
      - name: Run explorer view tests
        run: uv run --group explorer pytest tests/test_explorer_sankey.py -q
